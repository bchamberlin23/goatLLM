<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Android Pixel Frame</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --statusbar-fg: #1a1916;
    --navbar-fg: #1a1916;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: transparent;
    font-family: 'Roboto', system-ui, sans-serif;
  }
  .device {
    position: relative;
    width: 412px;
    height: 900px;
    border-radius: 48px;
    padding: 10px;
    background: linear-gradient(145deg, #2a2a2c 0%, #1a1a1c 50%, #0e0e10 100%);
    box-shadow:
      inset 0 0 0 1px rgba(255,255,255,0.04),
      inset 0 0 0 2px rgba(0,0,0,0.8),
      0 25px 50px -12px rgba(0,0,0,0.5);
  }
  .punch-hole {
    position: absolute;
    top: 22px;
    left: 50%;
    transform: translateX(-50%);
    width: 12px;
    height: 12px;
    background: #000;
    border-radius: 50%;
    z-index: 10;
  }
  .screen {
    width: 100%;
    height: 100%;
    border-radius: 40px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    background: #fff;
  }
  .statusbar {
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    font-size: 13px;
    font-weight: 500;
    color: var(--statusbar-fg);
    flex-shrink: 0;
  }
  .statusbar-right {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .inner {
    flex: 1;
    overflow: hidden;
  }
  .inner iframe {
    width: 100%;
    height: 100%;
    border: none;
  }
  .navbar {
    height: 48dp;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .navbar::after {
    content: '';
    width: 140px;
    height: 4px;
    background: var(--navbar-fg);
    border-radius: 2px;
  }
</style>
</head>
<body>
<div class="device">
  <div class="punch-hole"></div>
  <div class="screen">
    <div class="statusbar">
      <span>12:00</span>
      <span class="statusbar-right">
        <svg width="16" height="12" viewBox="0 0 16 12" fill="currentColor"><path d="M1 4.5C3.3 2.1 6.1 1 8.5 1s5.2 1.1 7.5 3.5l-1.1 1.1C12.9 3.6 10.6 2.5 8.5 2.5S4.1 3.6 2.1 5.6L1 4.5zm3 3C5.1 6.4 6.7 5.5 8.5 5.5s3.4.9 4.5 2l-1.1 1.1c-.8-.8-2-1.6-3.4-1.6s-2.6.8-3.4 1.6L5 7.5zm3 3c.6-.6 1.4-1 2.5-1s1.9.4 2.5 1l-1.1 1.1c-.3-.3-.8-.6-1.4-.6s-1.1.3-1.4.6L7 10.5z"/></svg>
        <svg width="25" height="12" viewBox="0 0 25 12" fill="currentColor"><rect x="0" y="1" width="21" height="10" rx="2" ry="2" fill="none" stroke="currentColor" stroke-width="1"/><rect x="22" y="4" width="2" height="4" rx="0.5" fill="currentColor" opacity="0.4"/><rect x="1.5" y="2.5" width="18" height="7" rx="1" fill="currentColor"/></svg>
      </span>
    </div>
    <div class="inner">
      <iframe id="screen-frame" sandbox="allow-scripts allow-same-origin" loading="lazy"></iframe>
    </div>
    <div class="navbar"></div>
  </div>
</div>
<script>
  const params = new URLSearchParams(window.location.search);
  const screen = params.get('screen');
  if (screen) {
    const iframe = document.getElementById('screen-frame');
    const isAbsolute = /^https?:\/\//.test(screen);
    iframe.src = isAbsolute ? screen : new URL(screen, document.referrer || location.href).href;
  }
</script>
</body>
</html>
