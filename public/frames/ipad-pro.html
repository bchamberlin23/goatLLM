<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>iPad Pro 11" Frame</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: transparent;
    font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  }
  .device {
    position: relative;
    width: 834px;
    height: 1194px;
    border-radius: 32px;
    padding: 16px;
    background: linear-gradient(145deg, #2a2a2c 0%, #1a1a1c 50%, #0e0e10 100%);
    box-shadow:
      inset 0 0 0 1px rgba(255,255,255,0.04),
      inset 0 0 0 2px rgba(0,0,0,0.8),
      0 25px 50px -12px rgba(0,0,0,0.5);
  }
  .camera {
    position: absolute;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    width: 8px;
    height: 8px;
    background: #1a1a1c;
    border-radius: 50%;
    z-index: 10;
  }
  .screen {
    width: 100%;
    height: 100%;
    border-radius: 18px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    background: #fff;
  }
  .statusbar {
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    font-size: 13px;
    font-weight: 600;
    color: #1a1916;
    flex-shrink: 0;
  }
  .inner {
    flex: 1;
    overflow: hidden;
  }
  .inner iframe {
    width: 100%;
    height: 100%;
    border: none;
  }
  .home-indicator {
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .home-indicator::after {
    content: '';
    width: 134px;
    height: 5px;
    background: #1a1916;
    border-radius: 3px;
  }
</style>
</head>
<body>
<div class="device">
  <div class="camera"></div>
  <div class="screen">
    <div class="statusbar">
      <span>9:41</span>
      <span>100%</span>
    </div>
    <div class="inner">
      <iframe id="screen-frame" sandbox="allow-scripts allow-same-origin" loading="lazy"></iframe>
    </div>
    <div class="home-indicator"></div>
  </div>
</div>
<script>
  const params = new URLSearchParams(window.location.search);
  const screen = params.get('screen');
  if (screen) {
    const iframe = document.getElementById('screen-frame');
    const isAbsolute = /^https?:\/\//.test(screen);
    iframe.src = isAbsolute ? screen : new URL(screen, document.referrer || location.href).href;
  }
</script>
</body>
</html>
